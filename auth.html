<!DOCTYPE strict>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    
    <!-- Crypto for Passwords -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script src="auth.js"></script>
</head>
<body class="auth-body">
    <a href="index.html" class="back-home"><i data-lucide="arrow-left"></i> Back to Home</a>
    
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-toggle">
                <button class="toggle-btn active" onclick="showLogin()">Login</button>
                <button class="toggle-btn" onclick="showRegister()">Register</button>
            </div>
            
            <div id="loginForm" class="auth-form active">
                <h2>Welcome Back</h2>
                <p class="text-secondary">Enter your credentials to access your account.</p>
                <form onsubmit="login(event)">
                    <div id="loginError" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none;">User not found or wrong password</div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-container">
                            <input type="password" id="loginPassword" class="form-input" required>
                            <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('loginPassword', this)">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                        <a href="#" onclick="forgotPassword(event)" style="font-size: 0.85rem; color: var(--accent-color); text-decoration: none; display: block; margin-top: 0.25rem; width: fit-content;">Forgot Password?</a>
                    </div>
                    <button type="submit" class="cta-button" style="width: 100%; margin-top: 1rem; border: none; font-family: inherit; cursor: pointer;">Login</button>
                </form>
            </div>

            <div id="registerForm" class="auth-form">
                <h2>Create Account</h2>
                <p class="text-secondary">Join Nexus for premium tech deals.</p>
                <form onsubmit="register(event)">
                    <div class="form-group">
                        <label>Profile Photo</label>
                        <input type="file" id="regPhoto" accept="image/*" class="form-input" required style="padding: 0.5rem; font-size: 0.9rem;">
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" id="regPhone" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="regAddress" class="form-input" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-container">
                            <input type="password" id="regPassword" class="form-input" required>
                            <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('regPassword', this)">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="cta-button" style="width: 100%; margin-top: 1rem; border: none; font-family: inherit; cursor: pointer;">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
      lucide.createIcons();
      function showLogin() {
          document.getElementById('loginForm').classList.add('active');
          document.getElementById('registerForm').classList.remove('active');
          document.querySelectorAll('.toggle-btn')[0].classList.add('active');
          document.querySelectorAll('.toggle-btn')[1].classList.remove('active');
      }
      function showRegister() {
          document.getElementById('registerForm').classList.add('active');
          document.getElementById('loginForm').classList.remove('active');
          document.querySelectorAll('.toggle-btn')[0].classList.remove('active');
          document.querySelectorAll('.toggle-btn')[1].classList.add('active');
      }

      function handleAuthForm() {
          const hash = window.location.hash;
          if(hash === '#register') {
              showRegister();
          } else {
              showLogin();
          }
      }
      
      // Run immediately
      handleAuthForm();
      
      // Also run on hash change
      window.addEventListener('hashchange', handleAuthForm);
      window.addEventListener('DOMContentLoaded', handleAuthForm);
    </script>
</body>
</html>
